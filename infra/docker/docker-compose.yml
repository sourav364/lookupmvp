version: "3.9"
services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    volumes:
      - ../../api:/app/api
      - ../../requirements.txt:/app/requirements.txt
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    networks: [shared]
  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    volumes:
      - ../../worker:/app/worker
      - ../../api:/app/api
      - ../../requirements.txt:/app/requirements.txt
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on: [redis]
    networks: [shared]
  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.app
    volumes:
      - ../../app:/app/app
      - ../../requirements.txt:/app/requirements.txt
    ports:
      - "8501:8501"
    depends_on: [api]
    networks: [shared]
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks: [shared]
networks:
  shared:
    driver: bridge
